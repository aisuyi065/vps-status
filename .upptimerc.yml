# Upptime 的主配置只改这里。
# 不要把真实 IP 写进公开仓库。真实 IPv4/IPv6 放到 GitHub Secrets：
# - HOST1_IPV4_IP，例如 192.0.2.10
# - HOST1_IPV6_IP，例如 2001:db8::10
# - HOST2_IPV4_IP，例如 198.51.100.20

owner: aisuyi065
repo: vps-status
user-agent: aisuyi065

sites:
  - name: 主机 1 IPv4
    slug: host-1-ipv4
    type: globalping
    check: icmp-ping
    url: $HOST1_IPV4_IP
  - name: 主机 1 IPv6
    slug: host-1-ipv6
    type: globalping
    check: icmp-ping
    url: $HOST1_IPV6_IP
  - name: 主机 2 IPv4
    slug: host-2-ipv4
    type: globalping
    check: icmp-ping
    url: $HOST2_IPV4_IP

status-website:
  # 如果你有自定义域名，取消下一行注释并改成你的域名。
  # cname: status.example.com
  # 如果使用默认 GitHub Pages 地址，把下面这行改成你的仓库名。
  baseUrl: /vps-status
  name: VPS Status
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  introTitle: "**VPS Status**"
  introMessage: 这里是基于 Upptime 的状态页，监控对象是你的 VPS。
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
